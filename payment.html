<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Management - HMS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <div class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-credit-card"></i>
                <h3>HMS Admin</h3>
            </div>
            <ul class="sidebar-menu">
                <li><a href="administrator.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="hostel.html"><i class="fas fa-hotel"></i> Hostels</a></li>
                <li><a href="mess.html"><i class="fas fa-utensils"></i> Mess</a></li>
                <li class="active"><a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a></li>
                <li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                <li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="top-nav">
                <div class="menu-toggle" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="user-info">
                    <span>Welcome, <span id="userName"></span></span>
                    <div class="user-avatar" id="userAvatar"></div>
                </div>
            </div>

            <div id="pageContent">
                <div class="spinner"></div>
            </div>
        </div>
    </div>

    <!-- Add Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Record Payment</h3>
                <span class="close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="paymentForm">
                    <div class="form-group">
                        <label>Student</label>
                        <select id="student_id" name="student_id" required></select>
                    </div>
                    <div class="form-group">
                        <label>Payment Type</label>
                        <select name="payment_type" required>
                            <option value="hostel_fee">Hostel Fee</option>
                            <option value="mess_fee">Mess Fee</option>
                            <option value="caution_deposit">Caution Deposit</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Amount (₹)</label>
                        <input type="number" name="amount" step="0.01" required>
                    </div>
                    <div class="form-group">
                        <label>Payment Date</label>
                        <input type="date" name="payment_date" required>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select name="payment_method">
                            <option value="cash">Cash</option>
                            <option value="card">Card</option>
                            <option value="online">Online</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary btn-block">Save Payment</button>
                </form>
            </div>
        </div>
    </div>

    <script>
    async function checkAuth() {
        const response = await fetch('api/dashboard.php');
        const data = await response.json();
        if (!data.success) window.location.href = 'index.html';
        else {
            document.getElementById('userName').textContent = data.data.user;
            document.getElementById('userAvatar').textContent = data.data.user.charAt(0);
            loadPayments();
            loadStudents();
        }
    }

    async function loadPayments() {
        const response = await fetch('api/payments.php');
        const data = await response.json();
        
        if (data.success) {
            const html = `
                <div class="card">
                    <div class="card-header">
                        <h3><i class="fas fa-credit-card"></i> Payment Records</h3>
                        <button class="btn btn-primary" onclick="showAddModal()">
                            <i class="fas fa-plus"></i> Add Payment
                        </button>
                    </div>
                    
                    <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; padding: 20px;">
                        <div class="stat-card">
                            <h4>Total Collected</h4>
                            <p style="font-size: 24px; color: #27ae60;">₹${data.summary.total_collected}</p>
                        </div>
                        <div class="stat-card">
                            <h4>Pending Dues</h4>
                            <p style="font-size: 24px; color: #e74c3c;">₹${data.summary.total_pending}</p>
                        </div>
                        <div class="stat-card">
                            <h4>This Month</h4>
                            <p style="font-size: 24px;">₹${data.summary.this_month}</p>
                        </div>
                    </div>
                    
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Student</th>
                                    <th>Type</th>
                                    <th>Amount</th>
                                    <th>Date</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${data.payments.map(p => `
                                    <tr>
                                        <td>${p.full_name}</td>
                                        <td>${p.payment_type.replace('_', ' ')}</td>
                                        <td>₹${p.amount}</td>
                                        <td>${p.payment_date}</td>
                                        <td><span class="badge badge-${p.status}">${p.status}</span></td>
                                        <td>
                                            ${p.status === 'pending' ? 
                                                `<button class="btn btn-sm btn-success" onclick="markPaid(${p.id})">
                                                    <i class="fas fa-check"></i>
                                                </button>` : 
                                                `<button class="btn btn-sm btn-info" onclick="viewReceipt(${p.id})">
                                                    <i class="fas fa-receipt"></i>
                                                </button>`
                                            }
                                            <button class="btn btn-sm btn-danger" onclick="deletePayment(${p.id})">
                                                <i class="fas fa-trash"></i>
                                            </button>
                                        </td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>
            `;
            document.getElementById('pageContent').innerHTML = html;
        }
    }

    async function loadStudents() {
        const response = await fetch('api/students.php');
        const data = await response.json();
        if (data.success) {
            const select = document.getElementById('student_id');
            select.innerHTML = '<option value="">Select Student</option>' + 
                data.data.map(s => `<option value="${s.id}">${s.full_name} (${s.student_id})</option>`).join('');
        }
    }

    function showAddModal() {
        document.getElementById('paymentForm').reset();
        document.getElementById('payment_date').value = new Date().toISOString().split('T')[0];
        document.getElementById('paymentModal').style.display = 'block';
    }

    document.getElementById('paymentForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const formData = new FormData(e.target);
        const response = await fetch('api/payments.php', { method: 'POST', body: formData });
        const data = await response.json();
        if (data.success) {
            alert('Payment recorded');
            closeModal();
            loadPayments();
        } else alert(data.message);
    });

    async function markPaid(id) {
        if (confirm('Mark as paid?')) {
            const response = await fetch(`api/payments.php?id=${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: `status=paid`
            });
            const data = await response.json();
            if (data.success) {
                alert('Payment marked as paid');
                loadPayments();
            }
        }
    }

    async function viewReceipt(id) {
        const response = await fetch(`api/payments.php?id=${id}`);
        const data = await response.json();
        if (data.success) {
            const p = data.data;
            alert(`Receipt #${p.id}\nStudent: ${p.full_name}\nAmount: ₹${p.amount}\nDate: ${p.payment_date}\nStatus: ${p.status}`);
        }
    }

    async function deletePayment(id) {
        if (confirm('Delete this payment record?')) {
            const response = await fetch(`api/payments.php?id=${id}`, { method: 'DELETE' });
            const data = await response.json();
            if (data.success) {
                alert('Payment deleted');
                loadPayments();
            }
        }
    }

    function closeModal() {
        document.getElementById('paymentModal').style.display = 'none';
    }

    function logout() {
        if (confirm('Logout?')) {
            fetch('api/login.php?logout=true').then(() => window.location.href = 'index.html');
        }
    }

    function toggleSidebar() {
        document.querySelector('.sidebar').classList.toggle('active');
    }

    checkAuth();
    </script>
</body>
</html>
