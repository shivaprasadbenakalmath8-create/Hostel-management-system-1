<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complaints Management - Hostel Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <div class="sidebar"><div class="sidebar-header"><i class="fas fa-exclamation-triangle"></i><h3>HMS Admin</h3></div>
        <ul class="sidebar-menu"><li><a href="administrator.html"><i class="fas fa-home"></i> Dashboard</a></li><li><a href="hostel.html"><i class="fas fa-hotel"></i> Hostels</a></li><li><a href="rooms.html"><i class="fas fa-door-open"></i> Rooms</a></li><li><a href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li><li><a href="staff.html"><i class="fas fa-users"></i> Staff</a></li><li><a href="allocations.html"><i class="fas fa-bed"></i> Allocations</a></li><li><a href="mess.html"><i class="fas fa-utensils"></i> Mess</a></li><li><a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a></li><li class="active"><a href="complaints.html"><i class="fas fa-exclamation-triangle"></i> Complaints</a></li><li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li><li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li><li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li></ul></div>
        <div class="main-content"><div class="top-nav"><div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div><div class="user-info"><span>Welcome, <span id="userName"></span></span><div class="user-avatar" id="userAvatar"></div></div></div><div id="pageContent"></div></div>
    </div>

    <div id="complaintModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>Update Complaint</h3><span class="close" onclick="closeModal('complaintModal')">&times;</span></div>
    <div class="modal-body"><form id="complaintForm"><input type="hidden" id="complaint_id" name="id"><div class="form-group"><label>Status</label><select id="status" name="status"><option value="pending">Pending</option><option value="in_progress">In Progress</option><option value="resolved">Resolved</option><option value="rejected">Rejected</option></select></div>
    <div class="form-group"><label>Assigned To</label><select id="assigned_to" name="assigned_to"></select></div>
    <div class="form-group"><label>Resolution</label><textarea id="resolution" name="resolution_text" rows="3"></textarea></div>
    <button type="submit" class="btn btn-primary btn-block">Update</button></form></div></div></div>

    <script>
    async function checkAuth(){ const res=await fetch('api/dashboard.php'); const data=await res.json(); if(!data.success||data.data.role!=='admin') window.location.href='index.html'; else{ document.getElementById('userName').textContent=data.data.user; document.getElementById('userAvatar').textContent=data.data.user.charAt(0); loadComplaints(); loadStaff(); } }
    async function loadComplaints(){ const res=await fetch('api/complaints.php'); const data=await res.json(); if(data.success){ const html=`<div class="card"><div class="card-header"><h3><i class="fas fa-exclamation-triangle"></i> Complaints Management</h3></div>
    <div class="stats-grid" style="margin-bottom:20px"><div class="stat-card"><h4>Pending</h4><p style="font-size:24px">${data.data.stats.pending}</p></div><div class="stat-card"><h4>In Progress</h4><p style="font-size:24px">${data.data.stats.in_progress}</p></div><div class="stat-card"><h4>Resolved</h4><p style="font-size:24px">${data.data.stats.resolved}</p></div></div>
    <div class="table-responsive"><table class="table"><thead><tr><th>Student</th><th>Type</th><th>Description</th><th>Priority</th><th>Status</th><th>Assigned To</th><th>Date</th><th>Actions</th> </thead><tbody>
    ${data.data.complaints.map(c=>`<tr><td><strong>${c.student_name}</strong><br><small>${c.student_id}</small></td><td>${c.complaint_type}</td><td>${c.description.substring(0,50)}...</td><td><span class="badge badge-${c.priority}">${c.priority}</span></td><td><span class="badge badge-${c.status}">${c.status}</span></td><td>${c.assigned_to_name||'Unassigned'}</td><td>${new Date(c.created_at).toLocaleDateString()}</td>
    <td><button class="btn btn-sm btn-primary" onclick="editComplaint(${c.id})"><i class="fas fa-edit"></i></button></td></tr>`).join('')}
    </tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html; } }
    async function loadStaff(){ const res=await fetch('api/staff.php'); const data=await res.json(); if(data.success){ const select=document.getElementById('assigned_to'); select.innerHTML='<option value="">Unassigned</option>'+data.data.map(s=>`<option value="${s.id}">${s.full_name}</option>`).join(''); } }
    async function editComplaint(id){ const res=await fetch(`api/complaints.php?id=${id}`); const data=await res.json(); if(data.success){ let c=data.data; document.getElementById('complaint_id').value=c.id; document.getElementById('status').value=c.status; document.getElementById('assigned_to').value=c.assigned_to||''; document.getElementById('resolution').value=c.resolution_text||''; document.getElementById('complaintModal').style.display='block'; } }
    document.getElementById('complaintForm').addEventListener('submit',async function(e){ e.preventDefault(); const formData=new FormData(this); const id=document.getElementById('complaint_id').value; const res=await fetch(`api/complaints.php?id=${id}`,{method:'PUT',body:formData}); const data=await res.json(); if(data.success){ alert('Updated'); closeModal('complaintModal'); loadComplaints(); }else alert(data.message); });
    function closeModal(id){ document.getElementById(id).style.display='none'; }
    function logout(){ if(confirm('Logout?')){ fetch('api/login.php?logout=true').then(()=>window.location.href='index.html'); } }
    function toggleSidebar(){ document.querySelector('.sidebar').classList.toggle('active'); }
    checkAuth();
    </script>
</body>
</html>
