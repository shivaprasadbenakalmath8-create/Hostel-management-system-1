<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hostel Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-building" style="font-size: 48px; color: #3498db; margin-bottom: 20px;"></i>
                <h2>Hostel Management System</h2>
                <p>Please login to continue</p>
            </div>
            
            <div id="alertContainer"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                
                <div class="form-group">
                    <label for="password"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                
                <button type="submit" class="btn btn-primary btn-block">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
            </form>
            
            <div style="text-align: center; margin-top: 20px;">
                <p>Demo Credentials:</p>
                <p>Admin: admin / admin123</p>
                <p>Student: john_doe / student123</p>
                <p>Staff: staff1 / staff123</p>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const formData = new FormData(this);
        
        try {
            const response = await fetch('api/login.php', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (data.success) {
                showAlert('success', data.message);
                
                // Redirect based on role
                setTimeout(() => {
                    if (data.data.role === 'admin') {
                        window.location.href = 'administrator.html';
                    } else if (data.data.role === 'student') {
                        window.location.href = 'student.html';
                    } else if (data.data.role === 'staff') {
                        window.location.href = 'staff.html';
                    }
                }, 1000);
            } else {
                showAlert('danger', data.message);
            }
        } catch (error) {
            showAlert('danger', 'Connection error. Please try again.');
        }
    });
    
    function showAlert(type, message) {
        const alertContainer = document.getElementById('alertContainer');
        const alertClass = `alert alert-${type}`;
        
        alertContainer.innerHTML = `
            <div class="${alertClass}">
                ${message}
            </div>
        `;
        
        // Auto hide after 3 seconds
        setTimeout(() => {
            alertContainer.innerHTML = '';
        }, 3000);
    }
    </script>
</body>
</html>
