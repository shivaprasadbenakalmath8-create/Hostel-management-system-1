<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Students Management - Hostel Management System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <div class="sidebar"><div class="sidebar-header"><i class="fas fa-user-graduate"></i><h3>HMS Admin</h3></div>
        <ul class="sidebar-menu"><li><a href="administrator.html"><i class="fas fa-home"></i> Dashboard</a></li><li><a href="hostel.html"><i class="fas fa-hotel"></i> Hostels</a></li><li><a href="rooms.html"><i class="fas fa-door-open"></i> Rooms</a></li><li class="active"><a href="students.html"><i class="fas fa-user-graduate"></i> Students</a></li><li><a href="staff.html"><i class="fas fa-users"></i> Staff</a></li><li><a href="allocations.html"><i class="fas fa-bed"></i> Allocations</a></li><li><a href="mess.html"><i class="fas fa-utensils"></i> Mess</a></li><li><a href="payment.html"><i class="fas fa-credit-card"></i> Payments</a></li><li><a href="reports.html"><i class="fas fa-chart-bar"></i> Reports</a></li><li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li><li><a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a></li></ul></div>
        <div class="main-content"><div class="top-nav"><div class="menu-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></div><div class="user-info"><span>Welcome, <span id="userName"></span></span><div class="user-avatar" id="userAvatar"></div></div></div><div id="pageContent"></div></div>
    </div>

    <div id="studentModal" class="modal"><div class="modal-content"><div class="modal-header"><h3 id="modalTitle">Add Student</h3><span class="close" onclick="closeModal('studentModal')">&times;</span></div>
    <div class="modal-body"><form id="studentForm"><input type="hidden" id="student_id" name="id"><div class="form-group"><label>Username</label><input type="text" id="username" name="username" required></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" name="password"></div><div class="form-group"><label>Full Name</label><input type="text" id="full_name" name="full_name" required></div>
    <div class="form-group"><label>Email</label><input type="email" id="email" name="email" required></div><div class="form-group"><label>Student ID</label><input type="text" id="student_id_no" name="student_id" required></div>
    <div class="form-group"><label>Course</label><input type="text" id="course" name="course"></div><div class="form-group"><label>Year</label><input type="number" id="year" name="year"></div>
    <div class="form-group"><label>Phone</label><input type="text" id="phone" name="phone"></div><div class="form-group"><label>Address</label><textarea id="address" name="address" rows="2"></textarea></div>
    <div class="form-group"><label>Guardian Name</label><input type="text" id="guardian_name" name="guardian_name"></div><div class="form-group"><label>Guardian Phone</label><input type="text" id="guardian_phone" name="guardian_phone"></div>
    <div class="form-group"><label>Joining Date</label><input type="date" id="joining_date" name="joining_date"></div>
    <button type="submit" class="btn btn-primary btn-block">Save Student</button></form></div></div></div>

    <script>
    async function checkAuth(){ const res=await fetch('api/dashboard.php'); const data=await res.json(); if(!data.success||data.data.role!=='admin') window.location.href='index.html'; else{ document.getElementById('userName').textContent=data.data.user; document.getElementById('userAvatar').textContent=data.data.user.charAt(0); loadStudents(); } }
    async function loadStudents(){ const res=await fetch('api/students.php'); const data=await res.json(); if(data.success){ const html=`<div class="card"><div class="card-header"><h3><i class="fas fa-user-graduate"></i> Student Management</h3><button class="btn btn-primary" onclick="showAddModal()"><i class="fas fa-plus"></i> Add Student</button></div>
    <div class="table-responsive"><table class="table"><thead><tr><th>Student ID</th><th>Name</th><th>Course</th><th>Year</th><th>Phone</th><th>Room</th><th>Status</th><th>Actions</th></tr></thead><tbody>
    ${data.data.map(s=>`<tr><td>${s.student_id}</td><td><strong>${s.full_name}</strong></td><td>${s.course||'-'}</td><td>${s.year||'-'}</td><td>${s.phone||'-'}</td><td>${s.room_number||'Not Allocated'}</td><td><span class="badge badge-${s.status}">${s.status}</span></td>
    <td><button class="btn btn-sm btn-primary" onclick="editStudent(${s.id})"><i class="fas fa-edit"></i></button><button class="btn btn-sm btn-danger" onclick="deleteStudent(${s.id})"><i class="fas fa-trash"></i></button></td></tr>`).join('')}
    </tbody></table></div></div>`; document.getElementById('pageContent').innerHTML=html; } }
    function showAddModal(){ document.getElementById('modalTitle').textContent='Add Student'; document.getElementById('studentForm').reset(); document.getElementById('student_id').value=''; document.getElementById('joining_date').value=new Date().toISOString().split('T')[0]; document.getElementById('studentModal').style.display='block'; }
    async function editStudent(id){ const res=await fetch(`api/students.php?id=${id}`); const data=await res.json(); if(data.success){ let s=data.data; document.getElementById('modalTitle').textContent='Edit Student'; document.getElementById('student_id').value=s.id; document.getElementById('username').value=s.username; document.getElementById('full_name').value=s.full_name; document.getElementById('email').value=s.email; document.getElementById('student_id_no').value=s.student_id; document.getElementById('course').value=s.course; document.getElementById('year').value=s.year; document.getElementById('phone').value=s.phone; document.getElementById('address').value=s.address; document.getElementById('guardian_name').value=s.guardian_name; document.getElementById('guardian_phone').value=s.guardian_phone; document.getElementById('joining_date').value=s.joining_date; document.getElementById('studentModal').style.display='block'; } }
    async function deleteStudent(id){ if(confirm('Delete this student?')){ const res=await fetch(`api/students.php?id=${id}`,{method:'DELETE'}); const data=await res.json(); if(data.success){ alert('Deleted'); loadStudents(); }else alert(data.message); } }
    document.getElementById('studentForm').addEventListener('submit',async function(e){ e.preventDefault(); const formData=new FormData(this); const id=document.getElementById('student_id').value; const url=id?`api/students.php?id=${id}`:'api/students.php'; const method=id?'PUT':'POST'; const res=await fetch(url,{method,body:formData}); const data=await res.json(); if(data.success){ alert(id?'Updated':'Added'); closeModal('studentModal'); loadStudents(); }else alert(data.message); });
    function closeModal(id){ document.getElementById(id).style.display='none'; }
    function logout(){ if(confirm('Logout?')){ fetch('api/login.php?logout=true').then(()=>window.location.href='index.html'); } }
    function toggleSidebar(){ document.querySelector('.sidebar').classList.toggle('active'); }
    checkAuth();
    </script>
</body>
</html>
